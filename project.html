<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light">
<title>NN Dental Clinic — FORM·A dsgn (mockup)</title>
<style>
  @font-face{
    font-family:'Figtree';
    src:url('Figtree-VariableFont_wght.ttf') format('truetype-variations'),
        url('Figtree-VariableFont_wght.ttf') format('truetype');
    font-weight:300 900; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'Roboto';
    src:url('Roboto-VariableFont_wdth,wght.ttf') format('truetype-variations'),
        url('Roboto-VariableFont_wdth,wght.ttf') format('truetype');
    font-weight:100 900; font-style:normal; font-display:swap;
  }

  :root{
    --bg:#ffffff; --ink:#111; --wrap:1600px;
    --side-pad: max(28px, calc((100vw - 1600px)/2 + 28px));
  }
  *{box-sizing:border-box} html{overflow-x:hidden}
  body{margin:0;background:var(--bg);color:var(--ink);
       font:16px/1.55 'Roboto',system-ui,-apple-system,'Segoe UI',Inter,Arial;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  a{color:inherit;text-decoration:none}

  /* ===== NAV — та сама система, що на index.html/projects.html: ховається при скролі вниз,
     замість неї випливає кругла кнопка MENU. Над hero — прозорий з білим текстом,
     тільки-но виходимо за межі hero — стає білим з темним текстом. ===== */
  .nav{
    position:fixed;top:0;left:0;width:100%;height:96px;display:flex;align-items:center;z-index:60;
    background:transparent; border-bottom:1px solid transparent;
    transition:background .35s ease, border-color .35s ease, transform .6s cubic-bezier(.22,.61,.36,1);
    will-change:transform;
  }
  .nav.solid{ background:#fff; border-bottom-color:rgba(0,0,0,.06); }
  .nav.hide{ transform:translateY(-110%); }
  .nav .wrap{width:100%;padding:0 28px;max-width:var(--wrap);margin:0 auto;}
  .nav .inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%;gap:16px;}
  .left,.right{display:flex;gap:28px;align-items:center;}
  .right{justify-content:flex-end;}
  .brand{font-family:'Figtree';font-weight:900;letter-spacing:.06em;color:#fff;font-size:34px; transition:color .35s ease;}
  .nav .link{font-family:'Figtree';font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:#fff;opacity:.85; transition:color .35s ease;}
  .nav .link.current{ opacity:1; }
  .nav.solid .brand{ color:var(--ink); }
  .nav.solid .link{ color:var(--ink); }

  .burger{ display:none; position:relative; width:32px; height:22px;
    background:none; border:none; cursor:pointer; padding:0; z-index:80; justify-self:end; }
  .burger span{ position:absolute; left:0; right:0; height:2px; background:#fff; transition:transform .3s ease, opacity .3s ease, background .35s ease; }
  .burger span:first-child{ top:4px; } .burger span:last-child{ top:16px; }
  .nav.solid .burger span{ background:var(--ink); }

  .mobile-menu{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:200; background:#000;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    padding:0 clamp(24px,6vw,80px); pointer-events:none; transform:translateY(-100%); visibility:hidden;
    transition:transform .75s cubic-bezier(.16,.84,.24,1), visibility 0s linear .75s; }
  .mobile-menu.open{ pointer-events:auto; transform:translateY(0); visibility:visible;
    transition:transform .75s cubic-bezier(.16,.84,.24,1), visibility 0s linear 0s; }

  .menu-fab{ position:fixed; top:24px; right:28px; z-index:250; overflow:hidden; border-radius:999px; pointer-events:none; }
  .menu-fab-btn{ display:inline-flex; align-items:center; justify-content:center; background:#111; color:#fff;
    padding:12px 24px; border-radius:999px; font-family:'Figtree'; font-size:14px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; border:none; cursor:pointer;
    transform:translateY(115%); transition:transform .55s cubic-bezier(.16,.84,.24,1); }
  .menu-fab.show{ pointer-events:auto; } .menu-fab.show .menu-fab-btn{ transform:translateY(0); }
  .menu-fab-btn .wm{ display:inline-block; overflow:hidden; vertical-align:top; }
  .menu-fab-btn .wm-i{ display:inline-block; transform:translateY(120%); opacity:0;
    transition:transform .5s cubic-bezier(.16,.84,.24,1), opacity .4s ease; }
  .menu-fab-btn .wm-i.in{ transform:translateY(0); opacity:1; }
  body.menu-active .nav.hide ~ .menu-fab{ pointer-events:auto; }
  body.menu-active .nav.hide ~ .menu-fab .menu-fab-btn{ transform:translateY(0) !important; }
  @media (max-width:999px){ .menu-fab{ top:18px; right:20px; } .menu-fab-btn{ padding:10px 20px; font-size:13px; } }

  .mobile-menu-links{ display:flex; flex-direction:column; align-items:flex-start; gap:0; width:100%; }
  .mobile-link{ font-family:'Figtree'; font-size:clamp(32px,5.5vw,64px); font-weight:400; line-height:0.95;
    color:#fff; text-transform:uppercase; text-align:left; letter-spacing:.02em;
    opacity:0; transform:translateY(16px); transition:opacity .4s ease, transform .4s ease; }
  .mobile-menu.open .mobile-link{ opacity:1; transform:translateY(0); }
  .mobile-menu.open .mobile-link:nth-child(1){ transition-delay:.05s; }
  .mobile-menu.open .mobile-link:nth-child(2){ transition-delay:.10s; }
  .mobile-menu.open .mobile-link:nth-child(3){ transition-delay:.15s; }
  .mobile-menu.open .mobile-link:nth-child(4){ transition-delay:.20s; }
  .mobile-menu.open .mobile-link:nth-child(5){ transition-delay:.25s; }
  .mobile-instagram{ position:absolute; bottom:32px; left:clamp(24px,6vw,80px); color:#fff; font-family:'Figtree';
    font-size:14px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; text-decoration:none;
    opacity:0; transform:translateY(10px); transition:opacity .4s ease, transform .4s ease; }
  .mobile-menu.open .mobile-instagram{ opacity:1; transform:translateY(0); transition-delay:.3s; }

  @media (max-width:999px){
    .left,.right{display:none;}
    .nav{ align-items:flex-start; padding-top:20px; height:84px; }
    .nav .inner{grid-template-columns:auto 1fr;}
    .nav .wrap{padding:0 20px;}
    .brand{font-size:22px; grid-column:1; justify-self:start; margin:0; line-height:1;}
    .burger{ display:flex; width:auto; height:auto; grid-column:2; justify-self:end; align-self:center; }
    .burger span{ display:none; }
    .burger::after{
      content:"MENU"; font-size:14px; font-weight:700; letter-spacing:.1em;
      color:#fff; line-height:1; transition:color .35s ease;
    }
    .nav.solid .burger::after{ color:var(--ink); }
    body.menu-active .brand{ color:#fff; }
    body.menu-active .burger::after{ content:"CLOSE"; color:#fff; }
  }

  /* ===== HERO ===== */
  .p-hero{
    position:relative; width:100%; height:100dvh; overflow:hidden;
  }
  .p-hero img{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    filter:brightness(.82);
  }
  .p-hero-scrim{
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.32) 0%, rgba(0,0,0,.05) 22%, rgba(0,0,0,0) 55%, rgba(0,0,0,.6) 100%);
  }
  .p-hero-content{
    position:absolute; left:0; right:0; bottom:0;
    padding:0 var(--side-pad) clamp(40px,6vh,72px);
    color:#fff;
  }
  .p-hero-scroll{
    position:absolute; right:var(--side-pad); bottom:clamp(40px,6vh,72px);
    display:flex; align-items:center; gap:10px;
    font-family:'Figtree'; font-size:13px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    color:rgba(255,255,255,.75);
  }
  .p-hero-scroll .ring{
    width:16px; height:16px; border:1.5px solid rgba(255,255,255,.75); border-radius:50%;
    animation:heroPulse 1.8s infinite;
  }
  @keyframes heroPulse{0%{opacity:.6;transform:scale(1)}70%{opacity:1;transform:scale(1.25)}100%{opacity:.3;transform:scale(1)}}
  @media (max-width:999px){ .p-hero-scroll{ display:none; } }
  .p-meta{
    font-family:'Figtree'; font-size:13px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    color:rgba(255,255,255,.75); margin:0 0 14px;
  }
  .p-meta span{ margin:0 10px; opacity:.5; }
  .p-hero-title{
    margin:0; font-family:'Figtree'; font-weight:900; letter-spacing:-.02em; line-height:.98;
    font-size:clamp(38px,7vw,96px); text-transform:uppercase;
    text-shadow:0 0 24px rgba(0,0,0,.25);
  }

  /* ===== DESCRIPTION BLOCKS (текст на зразок Services — слово-за-словом знизу вгору) ===== */
  .p-desc{
    padding:clamp(48px,7vh,88px) var(--side-pad);
    display:block;
  }
  .p-desc-inner{
    width:100%; text-align:center;
  }
  .p-desc p{
    margin:0;
    font-family:'Figtree'; font-weight:400; letter-spacing:-.01em; line-height:1.28;
    font-size:clamp(19px,2.6vw,36px); color:#161616;
  }
  /* Маска: кожне слово ховане і піднімається знизу вгору, з невеликим "виростанням" розміру */
  .p-desc p .wm{ display:inline-block; overflow:hidden; vertical-align:top; }
  .p-desc p .wm-i{
    display:inline-block;
    transform:translateY(115%) scale(.94);
    opacity:0;
    transition:transform .5s cubic-bezier(.16,.84,.24,1), opacity .4s ease;
    transition-delay: calc(var(--i, 0) * 0.02s);
  }
  .p-desc.reveal p .wm-i{
    transform:translateY(0) scale(1);
    opacity:1;
  }
  @media (max-width:640px){
    .p-desc{ padding:40px 24px; }
    .p-desc p{ font-size:clamp(18px,5vw,24px); }
  }

  /* ===== GALLERY — CSS Grid: широкі (landscape) фото на всю ширину edge-to-edge,
     вертикальні (portrait) автоматично стають по 2 в ряд (grid сам "упаковує" їх поруч,
     поки не зустріне наступне широке фото, яке знову займає весь рядок) ===== */
  .p-gallery{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:clamp(14px,1.6vw,28px);
    padding:0 var(--side-pad);
  }
  .gallery-last{ padding-bottom:clamp(40px,6vh,72px); }
  .p-gallery figure{
    margin:0;
    overflow:hidden;
  }
  .p-gallery figure.wide{ grid-column:1 / -1; }
  .p-gallery img{
    display:block; width:100%; height:100%; object-fit:cover;
  }
  .p-gallery figure.wide img{ aspect-ratio:3/2; }
  .p-gallery figure:not(.wide) img{ aspect-ratio:2/3; }
  @media (max-width:640px){
    .p-gallery{ grid-template-columns:1fr; padding:0 20px; }
    .gallery-last{ padding-bottom:40px; }
    .p-gallery figure.wide, .p-gallery figure:not(.wide){ grid-column:1 / -1; }
  }

  /* ===== NEXT PROJECT — проста кнопка-напис, без назви наступного проєкту ===== */
  .p-next{
    padding:clamp(32px,5vh,56px) var(--side-pad) 0;
    display:flex; justify-content:flex-end;
  }
  .p-next-btn{
    display:inline-flex; align-items:center; gap:10px;
    font-family:'Roboto'; font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink); padding-bottom:6px; position:relative;
  }
  .p-next-btn::before{
    content:''; position:absolute; left:0; bottom:0; width:100%; height:1px;
    background:rgba(0,0,0,.35); transition:background .25s ease;
  }
  .p-next-btn:hover::before{ background:#111; }
  .p-next-btn::after{
    content:''; width:6px; height:6px; border-radius:50%;
    border:1.5px solid rgba(0,0,0,.55); flex-shrink:0;
    transition:transform .3s ease, background .3s ease;
  }
  .p-next-btn:hover::after{ background:#111; transform:scale(1.15); }

  /* ===== FOOTER (як на projects.html — зліва copyright, справа велике слово) ===== */
  .page-foot{
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    padding:6px var(--side-pad) clamp(28px,4.5vh,48px);
  }
  .pf-copy{ font-family:'Roboto'; font-weight:600; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink); }
  .pf-title{
    font-family:'Figtree'; font-weight:900; letter-spacing:-.01em; text-transform:uppercase;
    font-size:clamp(32px,5vw,64px); color:var(--ink); line-height:1;
  }
  @media (max-width:740px){
    .page-foot{ flex-direction:row; justify-content:space-between; align-items:flex-end; gap:12px; }
    .pf-title{ font-size:clamp(20px,6vw,30px); line-height:1; white-space:nowrap; }
  }
</style>
</head>
<body>

  <!-- NAV -->
  <div class="nav" role="navigation" aria-label="Primary">
    <div class="wrap">
      <div class="inner">
        <div class="left">
          <a class="link current" href="projects.html">PROJECTS</a>
          <a class="link" href="services.html">SERVICES</a>
        </div>
        <a class="brand" href="index.html">FORM·A</a>
        <div class="right">
          <a class="link" href="index.html#about">ABOUT</a>
          <a class="link" href="contact.html">CONTACT</a>
        </div>
        <button class="burger" id="burgerBtn" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span>
        </button>
      </div>
    </div>
  </div>

  <div class="menu-fab" id="menuFab">
    <button class="menu-fab-btn" id="menuFabBtn" aria-label="Open menu"><span class="wm"><span class="wm-i in" id="menuFabLabel">MENU</span></span></button>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-menu-links">
      <a href="index.html#intro" class="mobile-link">HOME</a>
      <a href="projects.html" class="mobile-link">PROJECTS</a>
      <a href="index.html#services" class="mobile-link">SERVICES</a>
      <a href="index.html#about" class="mobile-link">ABOUT</a>
      <a href="contact.html" class="mobile-link">CONTACT</a>
    </nav>
    <a href="https://instagram.com" target="_blank" class="mobile-instagram">Instagram</a>
  </div>

  <!-- HERO -->
  <section class="p-hero" id="hero">
    <img id="heroImg" src="" alt="" loading="eager" fetchpriority="high">
    <div class="p-hero-scrim"></div>
    <div class="p-hero-content">
      <p class="p-meta" id="metaText"></p>
      <h1 class="p-hero-title" id="heroTitle"></h1>
    </div>
    <div class="p-hero-scroll"><span class="ring"></span>Scroll</div>
  </section>

  <!-- Контент проєкту (опис + галерея) — генерується JS-ом за даними з projects-data.js -->
  <div id="contentFlow"></div>

  <!-- NEXT PROJECT -->
  <a class="p-next" id="nextProjectLink" href="#">
    <span class="p-next-btn">Next project</span>
  </a>

  <!-- FOOTER -->
  <div class="page-foot">
    <span class="pf-copy">© 2026 FORM·A DSGN</span>
    <a class="pf-title" id="footerNextLink" href="#"></a>
  </div>

  <script src="projects-data.js"></script>
  <script>
    /* ===== Burger / MENU-fab — стандартна система, як на index.html/projects.html ===== */
    const burgerBtn = document.getElementById('burgerBtn');
    const menuFab = document.getElementById('menuFab');
    const menuFabBtn = document.getElementById('menuFabBtn');
    const menuFabLabel = document.getElementById('menuFabLabel');
    const mobileMenu = document.getElementById('mobileMenu');
    function setFabLabel(text){
      if (!menuFabLabel || menuFabLabel.textContent === text) { if(menuFabLabel) menuFabLabel.textContent = text; return; }
      menuFabLabel.classList.remove('in'); menuFabLabel.textContent = text;
      void menuFabLabel.offsetWidth;
      requestAnimationFrame(()=> menuFabLabel.classList.add('in'));
    }
    function openMobileMenu(){
      mobileMenu.classList.add('open'); document.body.classList.add('menu-active');
      burgerBtn.setAttribute('aria-expanded','true'); menuFabBtn.setAttribute('aria-expanded','true');
      setFabLabel('CLOSE');
    }
    function closeMobileMenu(){
      mobileMenu.classList.remove('open'); document.body.classList.remove('menu-active');
      burgerBtn.setAttribute('aria-expanded','false'); menuFabBtn.setAttribute('aria-expanded','false');
      setFabLabel('MENU');
    }
    function toggleMobileMenu(){ mobileMenu.classList.contains('open') ? closeMobileMenu() : openMobileMenu(); }
    burgerBtn.addEventListener('click', toggleMobileMenu);
    menuFabBtn.addEventListener('click', toggleMobileMenu);
    document.querySelectorAll('.mobile-link').forEach(link=>{
      link.addEventListener('click', ()=> closeMobileMenu());
    });

    /* ===== NAV: прозорий/білий залежно від hero + ховається при скролі вниз (як скрізь) ===== */
    (function(){
      const nav = document.querySelector('.nav');
      const fab = document.getElementById('menuFab');
      const hero = document.querySelector('.p-hero');
      if(!nav || !fab || !hero) return;

      let ticking = false;
      const HIDE_AFTER = 140, FAB_AFTER = 220, NEAR_TOP = 80;

      function update(){
        if (document.body.classList.contains('menu-active')){ ticking = false; return; }
        const y = window.pageYOffset || document.documentElement.scrollTop || 0;
        const heroBottom = hero.getBoundingClientRect().bottom;
        nav.classList.toggle('solid', heroBottom <= 96);
        if (y < NEAR_TOP){
          nav.classList.remove('hide'); fab.classList.remove('show');
        } else if (y > HIDE_AFTER){
          nav.classList.add('hide'); if (y > FAB_AFTER) fab.classList.add('show');
        }
        ticking = false;
      }
      function onScroll(){ if(!ticking){ ticking = true; requestAnimationFrame(update); } }
      window.addEventListener('scroll', onScroll, {passive:true});
      window.addEventListener('load', update, {once:true});
      update();
    })();

    /* ===== РЕНДЕР СТОРІНКИ ПРОЄКТУ ЗА ДАНИМИ (projects-data.js) ===== */
    (function(){
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const project = PROJECTS.find(p => p.id === id) || PROJECTS_DISPLAY[0];

      // Якщо в даних взагалі немає жодного проєкту — нічого показати
      if(!project){
        document.getElementById('contentFlow').innerHTML =
          '<div style="padding:120px 24px;text-align:center;font-family:Figtree,sans-serif;">Проєкт не знайдено. <a href="projects.html" style="text-decoration:underline;">Повернутись до проєктів</a></div>';
        return;
      }

      const CATEGORY_LABELS = { private:'Private', commercial:'Commercial', architecture:'Architecture' };

      /* --- HERO --- */
      document.title = project.title + ' — FORM·A dsgn';
      const heroImg = document.getElementById('heroImg');
      heroImg.src = project.folder + project.hero;
      heroImg.alt = project.title;
      document.getElementById('heroTitle').textContent = project.title;
      document.getElementById('metaText').innerHTML =
        (CATEGORY_LABELS[project.category] || project.category) +
        ' <span>•</span> ' + project.location + ' <span>•</span> ' + project.year;

      /* --- ОПИС + ГАЛЕРЕЯ: інтерлівінг фото і текстових блоків за полем afterPhoto --- */
      const flow = document.getElementById('contentFlow');
      const descs = (project.descriptions || []).slice().sort((a,b)=> a.afterPhoto - b.afterPhoto);
      const photos = project.photos || [];
      let photoIdx = 0;
      let descIdx = 0;

      function openGallery(){
        const div = document.createElement('div');
        div.className = 'p-gallery';
        return div;
      }
      function appendDesc(text){
        const sec = document.createElement('section');
        sec.className = 'p-desc';
        const inner = document.createElement('div');
        inner.className = 'p-desc-inner';
        const p = document.createElement('p');
        p.textContent = text;
        inner.appendChild(p);
        sec.appendChild(inner);
        flow.appendChild(sec);
      }
      function appendPhotoTo(gallery, photo){
        const figure = document.createElement('figure');
        const img = document.createElement('img');
        img.src = project.folder + photo.file;
        img.alt = photo.alt || project.title;
        img.decoding = 'async';
        figure.appendChild(img);
        gallery.appendChild(figure);
      }

      // спершу всі описи з afterPhoto === 0 (одразу під hero)
      while(descIdx < descs.length && descs[descIdx].afterPhoto === 0){
        appendDesc(descs[descIdx].text);
        descIdx++;
      }

      let currentGallery = null;
      while(photoIdx < photos.length){
        if(!currentGallery){ currentGallery = openGallery(); flow.appendChild(currentGallery); }
        appendPhotoTo(currentGallery, photos[photoIdx]);
        photoIdx++;

        // якщо після цього фото має з'явитись опис — закриваємо галерею і вставляємо текст
        while(descIdx < descs.length && descs[descIdx].afterPhoto === photoIdx){
          appendDesc(descs[descIdx].text);
          descIdx++;
          currentGallery = null; // наступне фото почне нову галерею
        }
      }
      // залишок описів (якщо afterPhoto більший за кількість фото) — в кінець
      while(descIdx < descs.length){ appendDesc(descs[descIdx].text); descIdx++; }

      // остання галерея отримує нижній відступ перед блоком "Next project"
      const allGalleries = flow.querySelectorAll('.p-gallery');
      if(allGalleries.length) allGalleries[allGalleries.length - 1].classList.add('gallery-last');

      /* --- NEXT PROJECT + FOOTER --- */
      const curIndex = PROJECTS_DISPLAY.findIndex(p => p.id === project.id);
      const hasNext = PROJECTS_DISPLAY.length > 1;
      const nextProject = hasNext ? PROJECTS_DISPLAY[(curIndex + 1) % PROJECTS_DISPLAY.length] : null;

      const nextLink = document.getElementById('nextProjectLink');
      const footerLink = document.getElementById('footerNextLink');
      if(nextProject){
        nextLink.href = 'project.html?id=' + nextProject.id;
        footerLink.href = 'project.html?id=' + nextProject.id;
        footerLink.textContent = nextProject.title;
      } else {
        // якщо це єдиний проєкт у базі — ведемо назад до загальної галереї
        nextLink.href = 'projects.html';
        footerLink.href = 'projects.html';
        footerLink.textContent = 'All projects';
      }

      /* --- Автоматичне визначення орієнтації фото галереї (без жодної анімації появи) --- */
      function markOrientation(img){
        const figure = img.closest('figure');
        if(!figure) return;
        function apply(){ if(img.naturalWidth > img.naturalHeight) figure.classList.add('wide'); }
        if(img.complete && img.naturalWidth) apply();
        else img.addEventListener('load', apply, {once:true});
      }
      document.querySelectorAll('.p-gallery img').forEach(markOrientation);

      /* --- Розбити текст описів на слова під маску --- */
      function wrapWords(el){
        const words = el.textContent.trim().split(/\s+/);
        el.innerHTML = words.map((w,i)=>
          `<span class="wm"><span class="wm-i" style="--i:${i}">${w}</span></span> `
        ).join('');
      }
      document.querySelectorAll('.p-desc p').forEach(wrapWords);

      /* --- Reveal опису при появі в кадрі --- */
      document.querySelectorAll('.p-desc').forEach(sec=>{
        const io = new IntersectionObserver(entries=>{
          entries.forEach(e=>{
            if(e.isIntersecting){ sec.classList.add('reveal'); io.unobserve(sec); }
          });
        }, {threshold:.2});
        io.observe(sec);
      });

    })();
  </script>
</body>
</html>
