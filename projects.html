<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="color-scheme" content="light">
<title>Projects — FORM·A dsgn</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
<style>
  /* ===== Custom fonts (ідентично index.html) ===== */
  @font-face{
    font-family:'Figtree';
    src:url('Figtree-VariableFont_wght.ttf') format('truetype-variations'),
        url('Figtree-VariableFont_wght.ttf') format('truetype');
    font-weight:300 900; font-style:normal; font-display:swap;
  }
  @font-face{
    font-family:'Roboto';
    src:url('Roboto-VariableFont_wdth,wght.ttf') format('truetype-variations'),
        url('Roboto-VariableFont_wdth,wght.ttf') format('truetype');
    font-weight:100 900; font-style:normal; font-display:swap;
  }

  :root{
    --bg:#ffffff; --ink:#111; --wrap:1600px;
    --side-pad: max(28px, calc((100vw - 1600px)/2 + 28px));
  }
  *{box-sizing:border-box} html{overflow-x:hidden; scrollbar-gutter:stable;}

  /* ===== PRELOADER (Projects) — той самий підхід, що на contact.html:
     білий фон, чорні букви F-O-R-M-A. Тримає екран, поки реально не готові
     обкладинки перших карток + шрифти, і лише тоді показує галерею — тому
     картки з'являються вже декодованими, без ривка на старті. ===== */
  .preloader{
    position:fixed; inset:0; z-index:9999;
    background:#fff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:22px;
    transition:opacity .5s ease, visibility 0s linear 0s;
  }
  .preloader.hide{
    opacity:0; visibility:hidden;
    transition:opacity .5s ease, visibility 0s linear .5s;
    pointer-events:none;
  }
  .preloader-mark{
    font-family:'Figtree'; font-weight:900; letter-spacing:0; text-transform:uppercase;
    font-size:clamp(90px,15vw,170px); color:#111; line-height:1;
    width:clamp(90px,15vw,170px); height:clamp(90px,15vw,170px);
    display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s ease;
  }
  .preloader-mark.font-ready{ opacity:1; }
  .preloader-edge-bar{
    position:fixed; bottom:0; left:0; width:100%; height:2px;
    background:rgba(0,0,0,.12);
    z-index:9999; overflow:hidden;
    transition:opacity .35s ease;
  }
  .preloader-edge-bar.hide{ opacity:0; }
  .preloader-edge-bar span{
    display:block; height:100%; width:0%;
    background:#111;
    transition:width .25s ease;
  }
  html.is-loading{ overflow:hidden; }

  /* ===== Поява галереї: контент виїжджає знизу вгору одним блоком
     (як page-reveal на contact.html). Nav навмисно НЕ обгорнутий —
     CSS transform створив би новий containing block і зламав fixed. ===== */
  .page-reveal{
    transform:translateY(60px);
    opacity:0;
    transition:transform 1.1s cubic-bezier(.19,.74,.24,1), opacity 1.2s ease;
    will-change:transform, opacity;
  }
  .page-reveal.in{ transform:translateY(0); opacity:1; }

  @media (min-width:768px){ html{ overscroll-behavior-y:none; } body{ overscroll-behavior-y:none; } }
  body{margin:0;background:var(--bg);color:var(--ink);
       font:16px/1.55 'Roboto',system-ui,-apple-system,'Segoe UI',Inter,Arial;
       -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  a{color:inherit;text-decoration:none}

  /* ===== NAV — та ж структура, що на головній, темний текст (тут фон завжди білий) ===== */
  .nav{position:fixed;top:0;left:0;width:100%;height:96px;display:flex;align-items:center;z-index:60;
       background:#fff;
       transition:transform .6s cubic-bezier(.22,.61,.36,1);will-change:transform}
  .nav .brand, .nav .link{ color:var(--ink); opacity:.95; }
  .nav .link:hover{ opacity:1; }
  .nav.hide{ transform: translateY(-110%); }
  .nav .wrap{width:100%;padding:0 28px;max-width:var(--wrap);margin:0 auto;}
  .nav .inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%;gap:16px;}
  .left,.right{display:flex;gap:28px;align-items:center;}
  .right{justify-content:flex-end;}
  .brand{font-family:'Figtree';font-weight:900;letter-spacing:.06em;color:var(--ink);font-size:34px;}
  .nav .link{font-family:'Figtree';font-size:18px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);opacity:.7;}
  .nav .link.current{ opacity:1; }
  .nav .link:hover{opacity:1;}

  .burger{ display:none; position:relative; width:32px; height:22px;
    background:none; border:none; cursor:pointer; padding:0; z-index:80; justify-self:end; }
  .burger span{ position:absolute; left:0; right:0; height:2px; background:var(--ink); transition:transform .3s ease, opacity .3s ease; }
  .burger span:first-child{ top:4px; } .burger span:last-child{ top:16px; }

  .mobile-menu{ position:fixed; top:0; left:0; width:100%; height:100%; z-index:200; background:#000;
    display:flex; flex-direction:column; align-items:flex-start; justify-content:center;
    padding:0 clamp(24px,6vw,80px); pointer-events:none; transform:translateY(-100%); visibility:hidden;
    transition:transform .75s cubic-bezier(.16,.84,.24,1), visibility 0s linear .75s; }
  .mobile-menu.open{ pointer-events:auto; transform:translateY(0); visibility:visible;
    transition:transform .75s cubic-bezier(.16,.84,.24,1), visibility 0s linear 0s; }

  .menu-fab{ position:fixed; top:24px; right:28px; z-index:250; overflow:hidden; border-radius:999px; pointer-events:none; }
  .menu-fab-btn{ display:inline-flex; align-items:center; justify-content:center; background:#111; color:#fff;
    padding:12px 24px; border-radius:999px; font-family:'Figtree'; font-size:14px; font-weight:700;
    letter-spacing:.1em; text-transform:uppercase; border:none; cursor:pointer;
    transform:translateY(115%); transition:transform .55s cubic-bezier(.16,.84,.24,1); }
  .menu-fab.show{ pointer-events:auto; } .menu-fab.show .menu-fab-btn{ transform:translateY(0); }
  .menu-fab-btn .wm{ display:inline-block; overflow:hidden; vertical-align:top; }
  .menu-fab-btn .wm-i{ display:inline-block; transform:translateY(120%); opacity:0;
    transition:transform .5s cubic-bezier(.16,.84,.24,1), opacity .4s ease; }
  .menu-fab-btn .wm-i.in{ transform:translateY(0); opacity:1; }
  body.menu-active .nav.hide ~ .menu-fab{ pointer-events:auto; }
  body.menu-active .nav.hide ~ .menu-fab .menu-fab-btn{ transform:translateY(0) !important; }
  @media (max-width:999px){ .menu-fab{ top:18px; right:20px; } .menu-fab-btn{ padding:10px 20px; font-size:13px; } }

  .mobile-menu-links{ display:flex; flex-direction:column; align-items:flex-start; gap:0; width:100%; }
  .mobile-link{ font-family:'Figtree'; font-size:clamp(32px,5.5vw,64px); font-weight:400; line-height:0.95;
    color:#fff; text-transform:uppercase; text-align:left; letter-spacing:.02em;
    opacity:0; transform:translateY(16px); transition:opacity .4s ease, transform .4s ease; }
  .mobile-menu.open .mobile-link{ opacity:1; transform:translateY(0); }
  .mobile-menu.open .mobile-link:nth-child(1){ transition-delay:.05s; }
  .mobile-menu.open .mobile-link:nth-child(2){ transition-delay:.10s; }
  .mobile-menu.open .mobile-link:nth-child(3){ transition-delay:.15s; }
  .mobile-menu.open .mobile-link:nth-child(4){ transition-delay:.20s; }
  .mobile-menu.open .mobile-link:nth-child(5){ transition-delay:.25s; }
  .mobile-instagram{ position:absolute; bottom:32px; left:clamp(24px,6vw,80px); color:#fff; font-family:'Figtree';
    font-size:14px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; text-decoration:none;
    opacity:0; transform:translateY(10px); transition:opacity .4s ease, transform .4s ease; }
  .mobile-menu.open .mobile-instagram{ opacity:1; transform:translateY(0); transition-delay:.3s; }

  @media (max-width:999px){
    .nav .inner{grid-template-columns:1fr auto 1fr;}
    .left{display:none;} .right{display:none;}
    .brand{font-size:clamp(24px,4.6vw,42px); grid-column:2; justify-self:center;}
    .nav .wrap{padding:0 20px;}
    .burger{display:flex; align-items:center; grid-column:3; justify-self:end;}

    .nav{ align-items:flex-start !important; padding-top:20px !important; height:84px !important; z-index:300 !important; }
    .nav .inner{ grid-template-columns:auto 1fr !important; }
    .brand{ font-size:22px !important; grid-column:1 !important; justify-self:start !important; transform:none !important; line-height:1 !important; }
    .burger{ grid-column:2 !important; align-self:center !important; width:auto !important; height:auto !important; }
    .burger span{ display:none !important; }
    .burger::after{ content:"MENU"; font-size:14px !important; font-weight:700; letter-spacing:.1em; color:var(--ink); line-height:1 !important; }
    body.menu-active .brand{ color:var(--ink) !important; }
    body.menu-active .burger::after{ content:"CLOSE" !important; color:var(--ink) !important; }
  }

  /* ===== PAGE =====
     Мінімум один екран висоти + flex-колонка: якщо фото мало, футер все одно
     "прицвяхований" до самого низу екрана (margin-top:auto нижче). Якщо фото
     багато і контент вищий за екран — сторінка просто природно росте вниз, і
     футер йде одразу за останнім рядком, як завжди. */
  .screen{
    min-height:100dvh; /* нативна CSS-одиниця, сама перераховується при повороті — JS більше не потрібен */
    display:flex; flex-direction:column;
    padding-top:96px;
  }

  /* ===== Фільтри категорій ===== */
  .filters{
    display:flex; gap:clamp(18px,2.2vw,32px);
    min-width:0;
    padding:clamp(18px,3vh,28px) var(--side-pad) 0;
  }
  .filter-btn{
    background:none; border:none; padding:0; cursor:pointer;
    font-family:'Figtree'; font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    color:var(--ink); transition:opacity .25s ease;
    display:inline-flex; align-items:center; gap:8px;
  }
  .filter-btn:hover{ opacity:.65; }
  .filter-btn::after{ content:none; }
  .filter-btn.active::after{
    content:'<';
    font-family:'Roboto'; font-size:.9em; font-weight:500; line-height:1;
  }
  .filters-col{ display:contents; }
  .filter-btn[data-cat="all"]{ order:1; }
  .filter-btn[data-cat="private"]{ order:2; }
  .filter-btn[data-cat="commercial"]{ order:3; }
  .filter-btn[data-cat="architecture"]{ order:4; }

  /* =====================================================================
     СІТКА ПРОЄКТІВ — чистий CSS Grid, без жодного JS-розрахунку розмірів.
     Кількість колонок підбирає сам браузер (auto-fit) залежно від ширини
     екрана — це вбудована, завжди стабільна поведінка, яка не залежить від
     resize/orientationchange подій і не може "зависнути" після повороту
     екрана (на відміну від попереднього підходу з JS-обрахунком).
     Кожна картка — одна з двох наперед заданих пропорцій (квадрат або
     висока 2:3), без "точної підгонки під ширину" — тому нема що рахувати
     заново при зміні розміру вікна. ===================================== */
  .rows{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
    align-items:end; /* картки стоять на спільній нижній лінії в межах рядка */
    gap:clamp(14px,1.6vw,28px);
    width:100%; min-width:0; /* без цього flex-контейнер .screen не дає гріду стиснутись на вузьких екранах */
    padding:clamp(20px,3vh,32px) var(--side-pad) 0;
  }
  .thumb{ display:flex; flex-direction:column; }
  .thumb-media{
    position:relative; overflow:hidden; background:var(--bg);
  }
  .thumb-media.ar-square{ aspect-ratio:1/1; }
  .thumb-media.ar-tall{ aspect-ratio:2/3; }
  .thumb-media img,
  .thumb-media .ph-fallback{
    position:absolute; inset:0; width:100%; height:100%;
    transform:translateY(0); /* видиме за замовчуванням — первинну появу тепер робить page-reveal */
    transition:transform .8s cubic-bezier(.16,.84,.24,1);
  }
  .thumb-media img{ object-fit:cover; }
  .thumb:hover .thumb-media img{ transform:translateY(0) scale(1.045); }
  .thumb-media .ph-fallback{
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#3a3a3a,#151515);
    color:rgba(255,255,255,.18); font-family:'Figtree'; font-weight:900; font-size:clamp(16px,2vw,28px);
  }
  .thumb .name{
    margin-top:10px; font-family:'Roboto'; font-weight:500; letter-spacing:.04em; text-transform:uppercase;
    font-size:clamp(11px,.85vw,14px); color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    opacity:1; transition:opacity .5s ease;
  }

  /* ===== Перемикання фільтрів: старі картки їдуть угору й зникають (.out),
     нові заходять знизу (.enter → знімається). Первинної появи це НЕ стосується —
     нею керує page-reveal. ===== */
  .thumb.enter .thumb-media img,
  .thumb.enter .thumb-media .ph-fallback{
    transform:translateY(100%);
    transition:transform .8s cubic-bezier(.16,.84,.24,1);
    transition-delay:var(--stagger, 0ms);
  }
  .thumb.enter .name{ opacity:0; }
  .thumb.out .thumb-media img,
  .thumb.out .thumb-media .ph-fallback{
    transform:translateY(-100%);
    transition:transform .45s cubic-bezier(.7,0,.84,0);
  }
  .thumb.out .name{ opacity:0; transition:opacity .2s ease; }

  /* ===== Футер =====
     margin-top:auto в flex-колонці .screen: якщо контенту (фото) мало,
     футер сам "прицвяхується" до самого низу екрана; якщо контенту багато —
     просто йде одразу за ним, без зайвого відступу. */
  .page-foot{
    margin-top:auto;
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    padding:clamp(24px,4vh,48px) var(--side-pad) clamp(28px,4.5vh,56px);
  }
  .pf-left{ display:flex; flex-direction:column; gap:6px; }
  .pf-copy, .pf-status{
    font-family:'Roboto'; font-weight:600; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink);
  }
  .pf-status{ color:rgba(0,0,0,.5); }
  .pf-title{
    font-family:'Figtree'; font-weight:900; letter-spacing:-.01em; text-transform:uppercase;
    font-size:clamp(32px,5vw,64px); color:var(--ink); line-height:1;
  }

  /* ===== MOBILE (<740px, або низька висота = телефон в landscape) ===== */
  @media (max-width:740px), (max-height:500px){
    .filters{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding:18px 20px 12px;
    }
    .filters-col{
      display:flex; flex-direction:column;
      gap:7px;
    }
    .filters-col:last-child{ align-items:flex-end; text-align:right; }
    .filter-btn{
      font-family:'Roboto'; font-size:15px; font-weight:500; letter-spacing:.04em;
    }
    .rows{ padding:0 20px 0; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); }
    .page-foot{
      flex-direction:row; padding:28px 20px calc(28px + env(safe-area-inset-bottom,0px));
    }
    .pf-title{ font-size:clamp(28px,9vw,44px); }
  }
</style>
</head>
<body>
  <!-- PRELOADER -->
  <div class="preloader" id="preloader">
    <div class="preloader-mark" id="preloaderMark">F</div>
  </div>
  <div class="preloader-edge-bar" id="preloaderEdgeBar"><span></span></div>

  <!-- NAV -->
  <div class="nav" role="navigation" aria-label="Primary">
    <div class="wrap">
      <div class="inner">
        <div class="left">
          <a class="link current" href="projects.html">PROJECTS</a>

        </div>
        <a class="brand" href="/" id="brandLink">FORM·A</a>

          <span></span><span></span>
        </button>
      </div>
    </div>
  </div>

  <div class="menu-fab" id="menuFab">
    <button class="menu-fab-btn" id="menuFabBtn" aria-label="Open menu"><span class="wm"><span class="wm-i in" id="menuFabLabel">MENU</span></span></button>
  </div>

  <div class="mobile-menu" id="mobileMenu">
    <nav class="mobile-menu-links">
      <a href="/#intro" class="mobile-link">HOME</a>
      <a href="projects.html" class="mobile-link">PROJECTS</a>
      <a href="services.html" class="mobile-link">SERVICES</a>
      <a href="about.html" class="mobile-link">ABOUT</a>
      <a href="contact.html" class="mobile-link">CONTACT</a>
    </nav>
    <a href="https://www.instagram.com/form.a_dsgn/" target="_blank" class="mobile-instagram">Instagram</a>
  </div>

  <!-- PAGE CONTENT -->
  <div class="page-reveal" id="pageReveal">
  <div class="screen">
    <div class="filters" id="filters">
      <div class="filters-col">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="commercial">Commercial</button>
      </div>
      <div class="filters-col">
        <button class="filter-btn" data-cat="private">Private</button>
        <button class="filter-btn" data-cat="architecture">Architecture</button>
      </div>
    </div>

    <div class="rows" id="rows">
      <!-- JS підставляє картки проєктів (без розрахунку розмірів — тільки фільтрація) -->
    </div>

    <div class="page-foot">
      <div class="pf-left">
        <span class="pf-status" id="pfStatus">KYI — · BTS —</span>
        <span class="pf-copy">© 2026 FORM·A DSGN</span>
      </div>
      <div class="pf-title">Projects</div>
    </div>
  </div>
  </div>

  <script src="projects-data.js"></script>
  <script>
    /* Проміс, який резолвиться, коли обкладинки перших видимих карток реально
       декодовані — його заповнює render() нижче. Оголошуємо тут, щоб preloader
       міг підписатись незалежно від порядку виконання. */
    window.__galleryReady = new Promise(resolve => { window.__resolveGallery = resolve; });

    /* ===== PRELOADER (як на contact.html): тримає екран, поки не готові
       обкладинки перших карток + шрифти, потім ховається — і галерея виїжджає
       вже з декодованими фото, без ривка. Страховка 3с. ===== */
    (function(){
      const preloader = document.getElementById('preloader');
      const mark = document.getElementById('preloaderMark');
      const edgeBar = document.getElementById('preloaderEdgeBar');
      const edgeFill = edgeBar ? edgeBar.querySelector('span') : null;
      if(!preloader) return;

      document.documentElement.classList.add('is-loading');

      const LETTERS = ['F','O','R','M','A'];
      let letterIdx = 0;
      const letterTimer = setInterval(()=>{
        letterIdx = (letterIdx + 1) % LETTERS.length;
        if(mark) mark.textContent = LETTERS[letterIdx];
      }, 250);

      if(mark){
        const revealMark = ()=> mark.classList.add('font-ready');
        if(document.fonts && document.fonts.load){
          document.fonts.load("900 170px Figtree").then(revealMark).catch(revealMark);
          setTimeout(revealMark, 600);
        } else { revealMark(); }
      }

      let done = false;
      function reallyHide(){
        if(done) return;
        done = true;
        clearInterval(letterTimer);
        if(edgeFill) edgeFill.style.width = '100%';
        preloader.classList.add('hide');
        if(edgeBar) edgeBar.classList.add('hide');
        document.documentElement.classList.remove('is-loading');
        // Галерея виїжджає одним блоком одночасно зі зникненням preloader.
        const reveal = document.getElementById('pageReveal');
        if(reveal){
          requestAnimationFrame(()=> requestAnimationFrame(()=> reveal.classList.add('in')));
          reveal.addEventListener('transitionend', ()=>{ reveal.style.transform = 'none'; }, {once:true});
        }
      }

      const galleryReady = window.__galleryReady || Promise.resolve();
      const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
      Promise.all([galleryReady, fontsReady]).then(reallyHide);
      setTimeout(reallyHide, 3000); // страховка
    })();

    /* ===== Burger / MENU-fab ===== */
    const burgerBtn = document.getElementById('burgerBtn');
    const menuFab = document.getElementById('menuFab');
    const menuFabBtn = document.getElementById('menuFabBtn');
    const menuFabLabel = document.getElementById('menuFabLabel');
    const mobileMenu = document.getElementById('mobileMenu');
    function setFabLabel(text){
      if (!menuFabLabel || menuFabLabel.textContent === text) { if(menuFabLabel) menuFabLabel.textContent = text; return; }
      menuFabLabel.classList.remove('in'); menuFabLabel.textContent = text;
      void menuFabLabel.offsetWidth;
      requestAnimationFrame(()=> menuFabLabel.classList.add('in'));
    }
    function openMobileMenu(){
      mobileMenu.classList.add('open'); document.body.classList.add('menu-active');
      burgerBtn.setAttribute('aria-expanded','true'); menuFabBtn.setAttribute('aria-expanded','true');
      setFabLabel('CLOSE');
    }
    function closeMobileMenu(){
      mobileMenu.classList.remove('open'); document.body.classList.remove('menu-active');
      burgerBtn.setAttribute('aria-expanded','false'); menuFabBtn.setAttribute('aria-expanded','false');
      setFabLabel('MENU');
    }
    function toggleMobileMenu(){ mobileMenu.classList.contains('open') ? closeMobileMenu() : openMobileMenu(); }
    burgerBtn.addEventListener('click', toggleMobileMenu);
    menuFabBtn.addEventListener('click', toggleMobileMenu);

    /* ===== NAV: ховається при скролі вниз ===== */
    (function(){
      const nav = document.querySelector('.nav');
      const fab = document.getElementById('menuFab');
      if(!nav || !fab) return;
      let ticking = false;
      const HIDE_AFTER = 140, FAB_AFTER = 220, NEAR_TOP = 80;
      function update(){
        if (document.body.classList.contains('menu-active')){ ticking = false; return; }
        const y = window.pageYOffset || document.documentElement.scrollTop || 0;
        if (y < NEAR_TOP){ nav.classList.remove('hide'); fab.classList.remove('show'); }
        else if (y > HIDE_AFTER){ nav.classList.add('hide'); if (y > FAB_AFTER) fab.classList.add('show'); }
        ticking = false;
      }
      function onScroll(){ if(!ticking){ ticking = true; requestAnimationFrame(update); } }
      window.addEventListener('scroll', onScroll, {passive:true});
      window.addEventListener('load', update, {once:true});
      update();
    })();

    /* ===== Футер: живий час Києва/Братислави ===== */
    (function(){
      const statusEl = document.getElementById('pfStatus');
      if(!statusEl) return;
      function timeIn(tz){
        return new Intl.DateTimeFormat('en-GB', { timeZone:tz, hour:'2-digit', minute:'2-digit', hour12:false }).format(new Date());
      }
      function update(){
        statusEl.textContent = 'KYI ' + timeIn('Europe/Kyiv') + ' · BTS ' + timeIn('Europe/Bratislava');
      }
      update();
      setInterval(update, 30000);
    })();

    /* ===== PROJECTS DATA — тепер береться з projects-data.js (спільне джерело даних) =====
       ratio лишається 'square' для картки в галереї (обкладинка завжди кадрується в квадрат,
       незалежно від оригінальної орієнтації фото — так само, як було раніше). */
    const projects = PROJECTS_DISPLAY.map(p => ({
      title: p.title,
      file: p.folder + p.hero,
      ratio: 'square',
      href: 'project.html?id=' + p.id,
      cat: p.category
    }));

    const rows = document.getElementById('rows');
    let activeCat = 'all';

    function buildThumb(p, i){
      const a = document.createElement('a');
      a.className = 'thumb';
      a.href = p.href;

      const media = document.createElement('div');
      media.className = 'thumb-media ' + (p.ratio === 'tall' ? 'ar-tall' : 'ar-square');

      const img = document.createElement('img');
      img.src = p.file;
      img.alt = p.title;
      img.loading = i < 4 ? 'eager' : 'lazy';
      img.decoding = 'async';
      if(i === 0) img.fetchPriority = 'high';
      img.onerror = function(){
        this.remove();
        const fb = document.createElement('div');
        fb.className = 'ph-fallback';
        fb.textContent = String(i+1).padStart(2,'0');
        media.appendChild(fb);
      };

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = p.title;

      media.appendChild(img);
      a.appendChild(media);
      a.appendChild(name);
      a._img = img;
      return a;
    }

    // Дочекатись реального декодування обкладинки картки.
    function decodeThumb(el){
      const img = el && el._img;
      if(!img || !img.decode) return Promise.resolve();
      if(img.complete && img.naturalWidth) return img.decode().catch(()=>{});
      return new Promise(res=>{
        let done=false; const fin=()=>{ if(done)return; done=true; img.decode().then(res).catch(res); };
        img.addEventListener('load', fin, {once:true});
        img.addEventListener('error', ()=>res(), {once:true});
      });
    }

    function render(isFirst){
      rows.innerHTML = '';
      const list = activeCat === 'all' ? projects : projects.filter(p=> p.cat === activeCat);
      list.forEach((p,i)=> rows.appendChild(buildThumb(p,i)));
      const thumbs = Array.from(rows.querySelectorAll('.thumb'));

      if(isFirst){
        // Первинний показ: картки одразу в кінцевому стані (видимі). Появою всього
        // блоку керує page-reveal після preloader — тому тут жодних per-card анімацій,
        // ніякого stagger, і ніякого ривка. Резолвимо галерею, коли декодовані перші фото.
        const GATE = Math.min(thumbs.length, 6);
        Promise.allSettled(thumbs.slice(0, GATE).map(decodeThumb))
          .then(()=> window.__resolveGallery && window.__resolveGallery());
        thumbs.slice(GATE).forEach(decodeThumb); // решту декодуємо у фоні
        return;
      }

      // Перемикання фільтра: нові картки заходять знизу плавною хвилею.
      thumbs.forEach((el,i)=>{
        el.style.setProperty('--stagger', (i*70)+'ms');
        el.classList.add('enter');
      });
      // Наступного кадру знімаємо .enter → картки виїжджають на місце.
      requestAnimationFrame(()=> requestAnimationFrame(()=>{
        thumbs.forEach(el=> el.classList.remove('enter'));
      }));
    }

    const filterBtns = Array.from(document.querySelectorAll('.filter-btn'));
    filterBtns.forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(btn.dataset.cat === activeCat) return;
        activeCat = btn.dataset.cat;
        filterBtns.forEach(b=> b.classList.toggle('active', b === btn));

        // Спочатку плавно ховаємо поточні картки, потім перебудовуємо сітку.
        const current = Array.from(rows.querySelectorAll('.thumb'));
        if(current.length){
          current.forEach((el,i)=>{
            el.style.setProperty('--stagger', (i*25)+'ms');
            el.classList.add('out');
          });
          setTimeout(()=> render(false), 320);
        } else {
          render(false);
        }
      });
    });

    render(true);
  </script>
</body>
</html>
